version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: cargo
    directories:
      - '/'
      - '/crates/**/*'
    schedule:
      interval: monthly
    groups:
      embassy:
        patterns:
          - embassy-*
    open-pull-requests-limit: 50
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
